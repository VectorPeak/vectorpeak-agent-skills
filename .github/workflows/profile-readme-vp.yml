name: profile-readme-vp

on:
  pull_request:
    paths:
      - "dev-skills/profile-readme-vp/**"
      - ".github/workflows/profile-readme-vp.yml"
  push:
    branches:
      - main
    paths:
      - "dev-skills/profile-readme-vp/**"
      - ".github/workflows/profile-readme-vp.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate trigger-only profile README skill
        run: |
          test -f dev-skills/profile-readme-vp/SKILL.md
          test -f dev-skills/profile-readme-vp/agents/openai.yaml
          test ! -e dev-skills/profile-readme-vp/scripts
          test ! -e dev-skills/profile-readme-vp/examples

          python - <<'PY'
          from pathlib import Path

          skill = Path("dev-skills/profile-readme-vp/SKILL.md").read_text(encoding="utf-8")
          metadata = Path("dev-skills/profile-readme-vp/agents/openai.yaml").read_text(encoding="utf-8")

          required_skill_text = [
              "VectorPeak/VectorPeak",
              ".github/workflows/update-profile.yml",
              "Update profile README",
              "gh workflow run update-profile.yml --repo VectorPeak/VectorPeak --ref main",
              "gh run watch <run-id> --repo VectorPeak/VectorPeak",
              "automation/update-profile-readme",
              "WORKFLOW_PUSH_PAT",
              "DASHSCOPE_API_KEY",
              "Do not add local README renderer scripts",
          ]
          for text in required_skill_text:
              assert text in skill, f"missing required skill text: {text}"

          forbidden_skill_text = [
              "collect_profile_data.py",
              "render_profile_readme.py",
              "profile-data.sample.json",
              "python <skill-dir>/scripts",
              "Generate VectorPeak's personal GitHub profile README",
          ]
          for text in forbidden_skill_text:
              assert text not in skill, f"obsolete generation detail leaked into skill: {text}"

          required_metadata_text = [
              "Profile README VP",
              "Trigger the VectorPeak profile README workflow",
              "Manually trigger and verify",
          ]
          for text in required_metadata_text:
              assert text in metadata, f"missing metadata text: {text}"
          PY
